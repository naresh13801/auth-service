# Application Properties

# Server Configuration
server.port=8081


# Spring R2DBC Configuration
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/auth_db
spring.r2dbc.username=postgres
spring.r2dbc.password=root

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SQL Initialization
spring.sql.init.mode=always

# Logging Configuration
logging.level.root=INFO
logging.level.com.phoenix.auth=DEBUG
logging.level.org.springframework.r2dbc=DEBUG

#JWT Configuration
jwt.secret=my-super-secret-key-my-super-secret-key
# Must be at least 256 bits (32 characters for HS256)
jwt.expiration=3600000 
# 1 hour in milliseconds